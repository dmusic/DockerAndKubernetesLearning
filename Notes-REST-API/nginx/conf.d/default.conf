# =============================================================================
# nginx — Virtual Server Configuration
# =============================================================================
# Upstream definitions, proxy rules, security headers, and timeouts.
# See SPEC.md §5 for the full requirements that govern this file.
# =============================================================================


# -----------------------------------------------------------------------------
# Upstreams
# -----------------------------------------------------------------------------
# Docker DNS on app-network resolves service names to container IPs.
# TASK-G1: verify both upstream names match the service names in compose.yaml.

upstream notebooks_api {
    # Circuit-breaker: stop forwarding to this backend for fail_timeout seconds
    # after max_fails consecutive failures.
    server notebooks-api:3000 max_fails=3 fail_timeout=30s;
}

upstream notes_api {
    server notes-api:3000 max_fails=3 fail_timeout=30s;
}


# -----------------------------------------------------------------------------
# Server block
# -----------------------------------------------------------------------------
server {
    listen       80;
    server_name  _;   # accept any hostname; replace with real domain in production

    # -------------------------------------------------------------------------
    # Security headers
    # Returned on every response regardless of upstream status.
    # -------------------------------------------------------------------------
    add_header X-Frame-Options         "SAMEORIGIN"              always;
    add_header X-Content-Type-Options  "nosniff"                 always;
    add_header X-XSS-Protection        "1; mode=block"           always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # -------------------------------------------------------------------------
    # Proxy timeouts (applied to all location blocks via inheritance)
    # -------------------------------------------------------------------------
    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # -------------------------------------------------------------------------
    # Proxy headers (forwarded on every proxied request)
    # These allow Express (behind nginx) to see the real client IP and protocol.
    # Requires `app.set('trust proxy', 1)` in Express — see SPEC.md §15.
    # -------------------------------------------------------------------------
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header Authorization      $http_authorization;

    # Disable passing the original Accept-Encoding header so nginx handles
    # decompression/compression rather than the upstream Node process.
    proxy_set_header Accept-Encoding    "";

    # -------------------------------------------------------------------------
    # Upstream failover
    # Retry the next available upstream server on these conditions.
    # -------------------------------------------------------------------------
    proxy_next_upstream       error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    # =========================================================================
    # Routing — auth (register / login)
    # =========================================================================
    # Auth is handled by notes-api. Both services verify JWT signatures only
    # (no DB lookup), so a token issued here is accepted by notebooks-api too,
    # provided both services are configured with the same JWT_SECRET.
    location /api/v1/auth {
        proxy_pass http://notes_api;
        proxy_pass_header Server;
    }

    # =========================================================================
    # Routing — notebooks-service
    # =========================================================================
    # All requests whose path starts with /api/v1/notebooks/ are forwarded to
    # the notebooks_api upstream.
    location /api/v1/notebooks {
        proxy_pass http://notebooks_api;
        proxy_pass_header Server;
    }

    # =========================================================================
    # Routing — notes-service
    # =========================================================================
    # All requests whose path starts with /api/v1/notes/ are forwarded to
    # the notes_api upstream.
    location /api/v1/notes {
        proxy_pass http://notes_api;
        proxy_pass_header Server;
    }

    # =========================================================================
    # Catch-all — reject everything else
    # =========================================================================
    # Any path that does not match the two prefixes above returns 404.
    # This prevents accidental exposure of paths not intended to be public.
    location / {
        return 404 '{"success":false,"error":{"message":"Not found","details":null}}';
        add_header Content-Type application/json always;
    }

    # -------------------------------------------------------------------------
    # Custom error pages for upstream failures
    # -------------------------------------------------------------------------
    error_page 502 503 504 /50x.json;
    location = /50x.json {
        internal;
        return 502 '{"success":false,"error":{"message":"Service temporarily unavailable","details":null}}';
        add_header Content-Type application/json always;
    }
}
