# =============================================================================
# nginx — Main Configuration
# =============================================================================
# This file sets process-level and global HTTP defaults.
# Virtual server / upstream / location logic lives in conf.d/default.conf.
# =============================================================================

# Run as the default nginx user inside the alpine container.
user  nginx;

# One worker per CPU core; 'auto' lets nginx detect this at runtime.
worker_processes  auto;

# Write errors to stderr so Docker captures them in container logs.
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    # Maximum simultaneous connections per worker.
    # For a small API behind Docker the default 1024 is sufficient.
    worker_connections  1024;
}

http {
    # -------------------------------------------------------------------------
    # MIME types
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    # Combined log format — written to stdout so Docker captures it.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Close keep-alive connections after 65 s of inactivity.
    keepalive_timeout  65;

    # Do not advertise the nginx version in error pages or Server header.
    server_tokens  off;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip  on;
    gzip_types  application/json text/plain application/javascript text/css;
    gzip_min_length  1024;
    gzip_vary  on;

    # -------------------------------------------------------------------------
    # Load virtual server configuration
    # -------------------------------------------------------------------------
    # All upstream, location, and header directives are in conf.d/default.conf.
    include /etc/nginx/conf.d/*.conf;
}
